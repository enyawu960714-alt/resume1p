<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人履歷</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }
    .container {
      max-width: 800px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1, h2 {
      color: #333;
    }
    .section {
      margin-bottom: 20px;
    }
    button {
      padding: 10px 15px;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>個人履歷</h1>
    <div class="section">
      <h2>基本資料</h2>
      <p>學校：亞洲大學</p>
      <p>學號：114018093</p>
      <p>姓名：吳念恩</p>
    </div>

    <div class="section">
      <h2>技能</h2>
      <ul>
        <li>HTML / CSS</li>
        <li>JavaScript</li>
        <li>溝通能力</li>
      </ul>
    </div>

    <div class="section">
      <h2>自我介紹</h2>
      <p id="intro" class="hidden">
        我是一位積極學習的學生，對網頁開發充滿興趣，喜歡挑戰新技術。
      </p>
      <button onclick="toggleIntro()">顯示/隱藏自我介紹</button>
    </div>
  </div>

  <script>
    function toggleIntro() {
      const intro = document.getElementById('intro');
      intro.classList.toggle('hidden');
    }
  </script>
</body>
</html>
